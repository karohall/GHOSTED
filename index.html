<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOSTED</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    margin: 0;
    padding: 0;
  }

  /* FULL PHOTO — fixed aspect ratio container */
  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-image: url('plywoodslabforest.jpg');
    background-size: cover;
    background-position: center top;
    overflow: hidden;
  }

  /* PILL OVERLAY — positioned to match the blue slab in the photo
     Photo is landscape, slab occupies roughly:
     left: 20% → right: 80% (60% wide)
     top: 8% → bottom: 68% (60% tall) */
  .pills-overlay {
    position: absolute;
    left: 30%;
    top: 17%;
    width: 44%;
    height: 53%;
  }

  .pill-wrap {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 5px;
  }

  .pill {
    width: 190px;
    min-height: 46px;
    height: auto;
    padding: 12px 0;
    border-radius: 50px;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: filter 0.3s ease, box-shadow 0.3s ease;
    border: none;
    box-shadow:
      0 3px 10px rgba(0,0,0,0.25),
      inset 0 1px 0 rgba(255,255,255,0.45),
      inset 0 -1px 0 rgba(0,0,0,0.12);
  }

  .pill span {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: transparent;
    transition: color 0.3s ease;
    white-space: normal;
    text-align: center;
    padding: 0 16px;
    line-height: 1.4;
  }

  .pill::after {
    content: '';
    position: absolute;
    top: -4px;
    right: -4px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    transition: all 0.3s ease;
  }

  .pill-wrap:hover .pill {
    filter: brightness(1.12);
    box-shadow:
      0 6px 22px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.55),
      inset 0 -1px 0 rgba(0,0,0,0.06);
  }

  .pill-wrap:hover .pill span { color: rgba(255,255,255,1); }
  .pill-wrap:hover .pill::after { background: white; transform: scale(1.3); }

  /* NOT DELIVERED */
  .exclaim {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(200,200,220,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: rgba(200,200,220,0.8);
    flex-shrink: 0;
  }

  .nd-text {
    font-size: 10px;
    font-weight: 300;
    color: rgba(200,200,220,0.7);
    letter-spacing: 0.02em;
  }

  .not-delivered {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-left: 4px;
  }

  /* COLORS */
  .c1 { background: rgba(100, 180, 230, 0.85); }
  .c2 { background: rgba(180, 120, 210, 0.85); }
  .c3 { background: rgba(240, 140, 100, 0.85); }
  .c4 { background: rgba(100, 200, 160, 0.85); }
  .c5 { background: rgba(240, 190,  80, 0.85); }
  .c6 { background: rgba(120, 160, 240, 0.85); }
  .c7 { background: rgba(220, 120, 150, 0.85); }
  .c8 { background: rgba(100, 210, 200, 0.85); }

  /* POSITIONS — relative within the slab overlay area */
  .w1 { top: 5%;  left: 3%; }
  .w2 { top: 5%;  left: 52%; }
  .w3 { top: 28%; left: 18%; }
  .w4 { top: 28%; left: 62%; }
  .w5 { top: 52%; left: 3%; }
  .w6 { top: 52%; left: 50%; }
  .w7 { top: 74%; left: 18%; }
  .w8 { top: 74%; left: 58%; }

</style>
</head>
<body>
  <div class="scene">
    <div class="pills-overlay">

      <div class="pill-wrap w1">
        <div class="pill c1"><span>I'm sorry I wasn't there</span></div>
      </div>

      <div class="pill-wrap w2">
        <div class="pill c2"><span style="text-align:left;">These past few weeks have been so crazy, you know?</span></div>
      </div>

      <div class="pill-wrap w3">
        <div style="display:flex; align-items:center; gap:8px;">
          <div class="pill c3"><span>I miss you</span></div>
          <div class="exclaim">!</div>
        </div>
        <div class="not-delivered">
          <span class="nd-text">Not Delivered</span>
        </div>
      </div>

      <div class="pill-wrap w4">
        <div class="pill c4"><span>Call me when you can</span></div>
      </div>

      <div class="pill-wrap w5">
        <div class="pill c5"><span>You didn't listen</span></div>
      </div>

      <div class="pill-wrap w6">
        <div class="pill c6"><span>Time went by so fast</span></div>
      </div>

      <div class="pill-wrap w7">
        <div class="pill c7"><span>I've been thinking about you</span></div>
      </div>

      <div class="pill-wrap w8">
        <div class="pill c8"><span>I just need some space</span></div>
      </div>

    </div>
  </div>
</body>
</html>
